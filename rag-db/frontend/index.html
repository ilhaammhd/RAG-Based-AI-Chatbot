<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG based AI Assistant</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: #f5f7f8;
            color: #18232d;
            font-family: "Segoe UI", Arial, sans-serif;
            display: grid;
            grid-template-columns: 310px 1fr;
        }

        aside {
            padding: 18px;
            background: #fff;
            border-right: 1px solid #d9e0e7;
            overflow-y: auto;
        }

        main {
            min-width: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        h1 {
            margin: 0 0 4px;
            font-size: 21px;
        }

        h2 {
            margin: 18px 0 8px;
            color: #64717f;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0;
        }

        .hint,
        .status {
            color: #64717f;
            font-size: 13px;
        }

        .panel {
            border: 1px solid #d9e0e7;
            border-radius: 8px;
            background: #fbfcfd;
            overflow: hidden;
        }

        .item {
            padding: 9px 10px;
            border-bottom: 1px solid #d9e0e7;
            font-size: 13px;
            line-height: 1.35;
        }

        .item:last-child {
            border-bottom: 0;
        }

        .item small {
            display: block;
            color: #64717f;
            margin-top: 3px;
        }

        #query-log {
            max-height: calc(100vh - 150px);
            overflow-y: auto;
        }

        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .message {
            width: min(860px, 92%);
            padding: 14px 16px;
            border-radius: 8px;
            line-height: 1.5;
            white-space: pre-wrap;
        }

        .bot {
            align-self: flex-start;
            background: #edf3f5;
            border: 1px solid #d9e0e7;
        }

        .user {
            align-self: flex-end;
            background: #1f7668;
            color: #fff;
        }

        .error {
            color: #b42318;
            border-color: #f1b8b4;
            background: #fff4f2;
        }

        .composer {
            padding: 16px 24px;
            background: #fff;
            border-top: 1px solid #d9e0e7;
        }

        form {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 10px;
        }

        textarea {
            min-height: 52px;
            max-height: 130px;
            resize: vertical;
            border: 1px solid #c7d1da;
            border-radius: 8px;
            padding: 12px;
            font: inherit;
        }

        textarea:focus {
            outline: 3px solid rgba(31, 118, 104, 0.16);
            border-color: #1f7668;
        }

        button {
            min-width: 84px;
            border: 0;
            border-radius: 8px;
            background: #1f7668;
            color: #fff;
            font-weight: 700;
            cursor: pointer;
        }

        button:disabled {
            opacity: 0.65;
            cursor: wait;
        }

        .secondary {
            width: 100%;
            height: 38px;
            margin-top: 14px;
            color: #18232d;
            background: #edf2f4;
            border: 1px solid #d9e0e7;
        }

        .bar {
            margin: 8px 0;
            background: #dce6e8;
            border-radius: 6px;
            overflow: hidden;
        }

        .bar span {
            display: block;
            padding: 5px 8px;
            min-width: 34px;
            background: #1f7668;
            color: #fff;
            font-size: 12px;
        }

        @media (max-width: 820px) {
            body {
                display: block;
            }

            aside {
                display: none;
            }

            main {
                height: 100vh;
            }

            #chat {
                padding: 14px;
            }

            .message {
                width: 100%;
            }

            .composer {
                padding: 12px;
            }
        }
    </style>
</head>

<body>
    <aside>
        <h1>Database RAG Assistant</h1>
        <div class="hint"> AI Chatbot</div>
        <button id="new-chat" class="secondary" type="button">New Chat</button>

        <h2>Recent Queries</h2>
        <div id="query-log" class="panel"><div class="item">Loading...</div></div>
    </aside>

    <main>
        <div id="chat">
            <div class="message bot">Ask a question about SQL Server, Python automation, email processing, DevOps, or JWT security.</div>
        </div>

        <div class="composer">
            <form id="chat-form">
                <textarea id="question" placeholder="Type your question here..."></textarea>
                <button id="send-button" type="submit">Send</button>
            </form>
            <div id="input-status" class="status">Ready.</div>
        </div>
    </main>

    <script>
        var API_BASE = window.location.protocol === 'file:' ? 'http://127.0.0.1:8000' : '';
        var chat = document.getElementById('chat');
        var question = document.getElementById('question');
        var sendButton = document.getElementById('send-button');
        var inputStatus = document.getElementById('input-status');

        document.getElementById('chat-form').addEventListener('submit', function (event) {
            event.preventDefault();
            askQuestion();
        });

        question.addEventListener('keydown', function (event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                askQuestion();
            }
        });

        document.getElementById('new-chat').addEventListener('click', function () {
            chat.innerHTML = '';
            addMessage('Ask a question about SQL Server, Python automation, email processing, DevOps, or JWT security.', 'bot');
            question.focus();
        });

        function askQuestion() {
            var text = question.value.trim();
            if (!text) {
                inputStatus.textContent = 'Type a question first.';
                question.focus();
                return;
            }

            addMessage(text, 'user');
            question.value = '';
            sendButton.disabled = true;
            inputStatus.textContent = 'Sending question to backend...';
            var loading = addMessage('Searching database...', 'bot');

            fetch(API_BASE + '/api/ask', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ query: text })
            })
                .then(function (response) {
                    return response.json().then(function (data) {
                        return { ok: response.ok, data: data };
                    });
                })
                .then(function (result) {
                    loading.remove();
                    if (!result.ok) {
                        addMessage(result.data.detail || 'Backend returned an error.', 'bot error');
                        inputStatus.textContent = 'Backend error.';
                        return;
                    }
                    addAnswer(result.data.response || 'No response returned.');
                    inputStatus.textContent = 'Ready.';
                    loadLogs();
                })
                .catch(function (error) {
                    loading.remove();
                    addMessage('Could not reach the backend. Open http://127.0.0.1:8000 and make sure python main.py is still running.\n\nError: ' + error.message, 'bot error');
                    inputStatus.textContent = 'Connection failed.';
                })
                .finally(function () {
                    sendButton.disabled = false;
                    question.focus();
                });
        }

        function addMessage(text, className) {
            var div = document.createElement('div');
            div.className = 'message ' + className;
            div.textContent = text;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
            return div;
        }

        function addAnswer(markdown) {
            var div = document.createElement('div');
            div.className = 'message bot';
            div.innerHTML = simpleMarkdown(markdown);
            chat.appendChild(div);
            addInlineBars(div, markdown);
            chat.scrollTop = chat.scrollHeight;
        }

        function simpleMarkdown(text) {
            var safe = escapeHtml(text || '');
            safe = safe.replace(/^## (.*)$/gm, '<strong>$1</strong>');
            safe = safe.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            safe = safe.replace(/\n/g, '<br>');
            return safe;
        }

        function addInlineBars(container, markdown) {
            if (markdown.indexOf('Graph Description') === -1 || markdown.indexOf('| Article | Rating |') === -1) return;

            var title = document.createElement('strong');
            title.textContent = 'Rating Graph';
            container.appendChild(document.createElement('br'));
            container.appendChild(document.createElement('br'));
            container.appendChild(title);

            var rows = markdown.split('\n').filter(function (line) {
                return line.indexOf('|') === 0 && line.indexOf('---') === -1 && line.indexOf('Article | Rating') === -1;
            });

            rows.forEach(function (line) {
                var cells = line.split('|').map(function (part) { return part.trim(); }).filter(Boolean);
                if (cells.length < 2) return;
                var rating = parseFloat(cells[1]);
                if (!isFinite(rating)) return;
                var label = cells[0] + ' - ' + rating + '/5';
                var bar = document.createElement('div');
                bar.className = 'bar';
                bar.innerHTML = '<span style="width:' + Math.max(10, rating * 20) + '%">' + escapeHtml(label) + '</span>';
                container.appendChild(bar);
            });
        }

        function loadHealth() {
            fetch(API_BASE + '/api/health')
                .then(function (response) { return response.json(); })
                .then(function (data) {
                    inputStatus.textContent = 'Ready. Backend online.';
                })
                .catch(function () {
                    inputStatus.textContent = 'Backend offline.';
                });
        }

        function loadLogs() {
            fetch(API_BASE + '/api/queries')
                .then(function (response) { return response.json(); })
                .then(function (logs) {
                    var box = document.getElementById('query-log');
                    box.innerHTML = '';
                    if (!logs.length) box.appendChild(item('No queries yet.', ''));
                    logs.forEach(function (log) {
                        box.appendChild(item(log.question, log.source || 'database-rag'));
                    });
                });
        }

        function item(title, subtitle) {
            var div = document.createElement('div');
            div.className = 'item';
            div.innerHTML = escapeHtml(title) + (subtitle ? '<small>' + escapeHtml(subtitle) + '</small>' : '');
            return div;
        }

        function escapeHtml(value) {
            return String(value || '').replace(/[&<>"']/g, function (char) {
                return {
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    '"': '&quot;',
                    "'": '&#039;'
                }[char];
            });
        }

        loadHealth();
        loadLogs();
        question.focus();
    </script>
</body>

</html>
